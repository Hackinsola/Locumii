<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Cookie Information CMP — loaded as high as possible so it can set Google
         Consent Mode v2 defaults before GA4 / Piwik fire. -->
    <script
      id="CookieConsent"
      src="https://policy.app.cookieinformation.com/uc.js"
      data-culture="EN"
      data-gcm-version="2.0"
      type="text/javascript"
    ></script>
    <!-- Google Search Console ownership verification. -->
    <meta name="google-site-verification" content="PAQW7bcVa3ohN3FtyaTyzj1j8zFncG23sCAGhIShRks" />
    <!-- Favicon set: SVG for modern browsers, PNG fallbacks (Google's favicon-in-search
         is most reliable with a square raster ≥48px), plus apple-touch-icon + manifest. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#3ECF8E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Locumii — the shift marketplace connecting Nigerian healthcare professionals with facilities. Verified credentials, escrow payments and ratings, launching in Abuja." />
    <link rel="canonical" href="https://www.locumii.com/" />
    <title>Locumii — Healthcare shifts, staffed and paid in one place</title>

    <!-- Open Graph / social link previews (og.png = landing screenshot via scripts/og-screenshot.mjs). -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Locumii" />
    <meta property="og:url" content="https://www.locumii.com/" />
    <meta property="og:title" content="Locumii — Healthcare shifts, staffed and paid in one place" />
    <meta property="og:description" content="The marketplace connecting verified Nigerian doctors, nurses, pharmacists and lab scientists with the clinics that need them. Launching in Abuja." />
    <meta property="og:image" content="https://www.locumii.com/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Locumii — healthcare shifts, staffed and paid in one place" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Locumii — Healthcare shifts, staffed and paid in one place" />
    <meta name="twitter:description" content="Verified healthcare professionals and facilities, escrow payments, ratings. Join the waitlist — launching in Abuja." />
    <meta name="twitter:image" content="https://www.locumii.com/og.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet" />
    <script src="https://js.paystack.co/v1/inline.js"></script>

    <!-- Organization structured data — Google's documented signal for the brand logo
         (https://developers.google.com/search/docs/appearance/structured-data/logo).
         The `logo` is what Google associates with the Locumii name in search. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Locumii",
        "alternateName": "Locumii Health",
        "url": "https://www.locumii.com/",
        "logo": "https://www.locumii.com/icon-512.png",
        "image": "https://www.locumii.com/og.png",
        "description": "Locumii is the shift marketplace connecting verified Nigerian healthcare professionals with the facilities that need them — credentials, escrow payments and ratings built in.",
        "foundingLocation": {
          "@type": "Place",
          "name": "Abuja, Nigeria"
        },
        "areaServed": {
          "@type": "AdministrativeArea",
          "name": "Federal Capital Territory, Nigeria"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
